<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Phalanx — Mobile</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-text-size-adjust:100%}
:root{
  --accent:#5f8fad;--green:#4a9a65;--amber:#a89540;--red:#b85454;
  --mono:'SF Mono','Fira Code','Consolas','JetBrains Mono',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
html{height:100%;overflow:hidden;position:fixed;inset:0}
body{height:100%;overflow:hidden;position:fixed;inset:0;font-family:var(--sans);background:#000;color:#fff;-webkit-font-smoothing:antialiased;touch-action:none}

/* ═══════ MAP — full screen, accepts gestures ═══════ */
.map{position:fixed;inset:0;background:#0a0a0a url('aerial.jpg') center/cover no-repeat;touch-action:manipulation;z-index:1}
.map-scan{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:2}

/* Crosshair */
.crosshair{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;pointer-events:none;z-index:3}
.crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.08)}
.crosshair::before{width:1px;height:100%;left:50%}
.crosshair::after{height:1px;width:100%;top:50%}

/* ═══════ TOP GRADIENT ═══════ */
.top-grad{position:fixed;top:0;left:0;right:0;height:80px;background:linear-gradient(to bottom,rgba(0,0,0,.7) 0%,rgba(0,0,0,.25) 60%,transparent 100%);pointer-events:none;z-index:10}
.topbar{position:fixed;top:0;left:0;right:0;z-index:20;height:36px;display:flex;align-items:center;padding:0 14px;gap:6px;pointer-events:none}
.topbar .logo{font-weight:700;font-size:13px;color:#fff;letter-spacing:-.02em}
.topbar .dot{width:5px;height:5px;border-radius:50%}
.topbar .telem{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.35);letter-spacing:.3px;display:flex;gap:8px;white-space:nowrap}
.topbar .tv{color:rgba(255,255,255,.6);font-weight:500}
.topbar .tg{color:var(--green)}
.topbar .pill{margin-left:auto;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-radius:4px;padding:2px 7px;font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:3px}
.pill-dot{width:4px;height:4px;border-radius:50%}
.pause-btn{position:fixed;top:42px;right:14px;z-index:20;padding:4px 8px;border-radius:4px;font-family:var(--mono);font-size:9px;font-weight:500;border:1px solid rgba(184,84,84,.25);background:rgba(0,0,0,.5);color:var(--red);display:flex;align-items:center;gap:3px;pointer-events:auto}
.pause-btn .material-symbols-outlined{font-size:12px}

/* ═══════ BOTTOM GRADIENT ═══════ */
.bottom-grad{position:fixed;bottom:0;left:0;right:0;height:42%;background:linear-gradient(to top,#000 0%,rgba(0,0,0,.95) 25%,rgba(0,0,0,.55) 60%,transparent 100%);pointer-events:none;z-index:10}

/* ═══════ RESIDUAL MESSAGES ═══════ */
.residual{position:fixed;bottom:58px;left:0;right:0;z-index:15;padding:0 14px}
.r-msg{padding:7px 0;border-top:1px solid rgba(255,255,255,.06);font-size:13px;line-height:1.4}
.r-msg:first-child{border-top:none}
.r-msg.op100{color:rgba(255,255,255,.92)}
.r-msg.op50{color:rgba(255,255,255,.45)}
.r-msg.op20{color:rgba(255,255,255,.18);max-height:20px;overflow:hidden}
.r-msg .ico{font-size:11px;vertical-align:-1px;margin-right:3px}
.r-msg .ico.sara-ico{color:rgba(95,143,173,.5)}
.r-msg .ico.user-ico{color:rgba(255,255,255,.25)}
.r-bottom{border-top:1px solid rgba(255,255,255,.08)}

/* ═══════ PTT BAR ═══════ */
.ptt-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:6px 12px;padding-bottom:max(6px,env(safe-area-inset-bottom));background:#000;display:flex;align-items:center;gap:6px}
.ptt-btn{flex:1;height:46px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:500;color:rgba(255,255,255,.28);cursor:pointer;transition:all .2s;user-select:none;-webkit-user-select:none;touch-action:none}
.ptt-btn .material-symbols-outlined{font-size:20px;color:rgba(255,255,255,.18);transition:color .15s}
.ptt-btn.active{background:rgba(184,84,84,.1);border-color:rgba(184,84,84,.25);color:rgba(255,255,255,.9)}
.ptt-btn.active .material-symbols-outlined{color:var(--red)}
.kb-btn{width:46px;height:46px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kb-btn .material-symbols-outlined{font-size:20px;color:rgba(255,255,255,.18)}

/* ═══════ DRAWER ═══════ */
.drawer-scrim{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .35s}
.drawer-scrim.on{opacity:1;pointer-events:auto}

.drawer{
  position:fixed;bottom:0;left:0;right:0;z-index:90;
  height:62vh;
  background:#0c0c0e;
  border-top-left-radius:14px;border-top-right-radius:14px;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.32,.72,0,1);
  display:flex;flex-direction:column;
  touch-action:none;
  /* DEPTH */
  box-shadow:0 -4px 30px rgba(0,0,0,.7),0 -1px 0 rgba(255,255,255,.04);
}
.drawer.open{transform:translateY(0)}

/* Handle */
.drawer-handle-area{padding:10px 0 6px;flex-shrink:0;display:flex;justify-content:center;cursor:grab}
.drawer-handle{width:32px;height:3px;background:rgba(255,255,255,.18);border-radius:2px}

/* ═══════ CHAT HISTORY ═══════ */
.chat-history{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 8px;overscroll-behavior:contain}
.chat-history::-webkit-scrollbar{display:none}

/* Message bubbles with hierarchy */
.ch-msg{margin-bottom:2px;padding:10px 0;position:relative}
.ch-msg+.ch-msg{border-top:1px solid rgba(255,255,255,.03)}

/* SARA — left, accent indicator */
.ch-msg.sara{padding-left:10px;border-left:2px solid rgba(95,143,173,.25)}
.ch-msg.sara .ch-role{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.ch-msg.sara .ch-role .material-symbols-outlined{font-size:11px}
.ch-msg.sara .ch-text{font-size:13px;line-height:1.5;color:rgba(255,255,255,.75)}

/* USER — right-aligned, distinct */
.ch-msg.user{text-align:right;padding-right:10px;border-right:2px solid rgba(255,255,255,.12);border-left:none}
.ch-msg.user .ch-role{font-family:var(--mono);font-size:9px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:4px}
.ch-msg.user .ch-role .material-symbols-outlined{font-size:11px}
.ch-msg.user .ch-text{font-size:13px;line-height:1.5;color:rgba(255,255,255,.9)}

/* ═══════ TRANSCRIPTION AREA ═══════ */
.tx-area{flex-shrink:0;padding:14px 16px;border-top:1px solid rgba(255,255,255,.06);display:none;background:rgba(255,255,255,.02)}
.tx-area.on{display:block}

.waveform{display:flex;align-items:center;justify-content:center;gap:2px;height:28px;margin-bottom:10px}
.waveform span{width:3px;border-radius:1px;background:var(--red);animation:wave .7s ease-in-out infinite}
@keyframes wave{0%,100%{height:4px}50%{height:22px}}
.waveform span:nth-child(1){animation-delay:0s}.waveform span:nth-child(2){animation-delay:.08s}
.waveform span:nth-child(3){animation-delay:.16s}.waveform span:nth-child(4){animation-delay:.04s}
.waveform span:nth-child(5){animation-delay:.12s}.waveform span:nth-child(6){animation-delay:.2s}
.waveform span:nth-child(7){animation-delay:.06s}.waveform span:nth-child(8){animation-delay:.14s}
.waveform span:nth-child(9){animation-delay:.1s}.waveform span:nth-child(10){animation-delay:.18s}
.waveform span:nth-child(11){animation-delay:.02s}.waveform span:nth-child(12){animation-delay:.15s}
.waveform span:nth-child(13){animation-delay:.07s}.waveform span:nth-child(14){animation-delay:.13s}
.waveform span:nth-child(15){animation-delay:.09s}.waveform span:nth-child(16){animation-delay:.17s}
.waveform.off span{animation:none;height:3px;background:rgba(255,255,255,.08);transition:all .3s}

.tx-text{font-size:15px;line-height:1.55;color:#fff;min-height:20px}
.tx-text .w{display:inline;animation:wordIn .2s ease both}
@keyframes wordIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.tx-text.dim{font-size:13px;color:rgba(255,255,255,.35);transition:all .4s}

/* Scan line */
.scan{height:2px;margin:12px 0;overflow:hidden;opacity:0}
.scan.on{opacity:1}
.scan .bar{height:100%;width:50px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanMove 1.2s ease-out forwards}
@keyframes scanMove{from{transform:translateX(-50px)}to{transform:translateX(calc(100vw + 50px))}}

/* SARA response */
.sr{padding-top:8px;opacity:0;transition:opacity .3s}
.sr.on{opacity:1}
.sr-label{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.sr-label .material-symbols-outlined{font-size:11px}
.sr-text{font-size:14px;line-height:1.55;color:rgba(255,255,255,.85)}
.sr-text .w{display:inline;animation:wordIn .15s ease both}

/* Drawer PTT */
.drawer-ptt{flex-shrink:0;padding:6px 12px;padding-bottom:max(6px,env(safe-area-inset-bottom));border-top:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:6px;background:#0c0c0e}
</style>
</head>
<body>

<!-- MAP — full screen, touch gestures work -->
<div class="map" id="map"></div>
<div class="map-scan"></div>
<div class="crosshair"></div>

<!-- TOP -->
<div class="top-grad"></div>
<div class="topbar">
  <span class="logo">Phalanx</span>
  <span class="dot" style="background:var(--green)"></span>
  <span class="telem">
    <span>ALT <span class="tv">120m</span></span>
    <span>SPD <span class="tv">45</span></span>
    <span>BAT <span class="tv tg">87%</span></span>
    <span>PROG <span class="tv">25%</span></span>
  </span>
  <div class="pill"><span class="pill-dot" style="background:var(--green)"></span>DSA-128</div>
</div>
<button class="pause-btn"><span class="material-symbols-outlined">pause_circle</span> Pause</button>

<!-- BOTTOM -->
<div class="bottom-grad"></div>

<!-- RESIDUAL -->
<div class="residual" id="residual"></div>

<!-- PTT -->
<div class="ptt-bar" id="pttBar">
  <div class="ptt-btn" id="pttBtn"><span class="material-symbols-outlined">mic</span><span>Hold to talk</span></div>
  <div class="kb-btn"><span class="material-symbols-outlined">keyboard</span></div>
</div>

<!-- DRAWER -->
<div class="drawer-scrim" id="scrim"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle-area" id="handleArea"><div class="drawer-handle"></div></div>
  <div class="chat-history" id="chatHistory"></div>
  <div class="tx-area" id="txArea">
    <div class="waveform" id="waveform"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="tx-text" id="txText"></div>
    <div class="scan" id="scan"><div class="bar"></div></div>
    <div class="sr" id="sr">
      <div class="sr-label"><span class="material-symbols-outlined">volume_up</span> SARA</div>
      <div class="sr-text" id="srText"></div>
    </div>
  </div>
  <div class="drawer-ptt">
    <div class="ptt-btn" id="dPttBtn"><span class="material-symbols-outlined">mic</span><span>Hold to talk</span></div>
    <div class="kb-btn"><span class="material-symbols-outlined">keyboard</span></div>
  </div>
</div>

<script>
// ═══════ STATE ═══════
let open=false, recording=false, wt=null, demoIdx=0;

// Start with empty chat — user builds it up through interactions
const msgs=[];

// Multiple scripted exchanges — each PTT press plays the next one
const exchanges=[
  {
    user:["What's","the","wind","looking","like?"],
    sara:["Wind","5","mph","NW.","Conditions","nominal."]
  },
  {
    user:["Head","toward","the","east","side","of","the","park","first."],
    sara:["Adjusting","route.","Heading","east","toward","the","park","boundary."]
  },
  {
    user:["Please","focus","on","the","intersection","of","Washington","and","Dupont.","I","think","the","car","might","be","there."],
    sara:["Confirmed.","Rerouting","to","Washington","and","Dupont","for","observation."]
  },
  {
    user:["Can","you","drop","altitude","and","get","a","closer","look?"],
    sara:["Descending","to","60","meters.","Switching","to","high-resolution","camera."]
  },
  {
    user:["I","think","I","see","it.","Circle","that","red","vehicle."],
    sara:["Target","acquired.","Entering","orbit","mode","around","red","SUV","at","Washington","and","Dupont."]
  },
];

// ═══════ RENDER ═══════
function renderChat(){
  const el=document.getElementById('chatHistory');
  el.innerHTML=msgs.map(m=>{
    if(m.r==='sara') return `<div class="ch-msg sara"><div class="ch-role"><span class="material-symbols-outlined">volume_up</span>SARA</div><div class="ch-text">${m.t}</div></div>`;
    return `<div class="ch-msg user"><div class="ch-role">YOU<span class="material-symbols-outlined">mic</span></div><div class="ch-text">${m.t}</div></div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

function updateResidual(){
  const el=document.getElementById('residual');
  const last3=msgs.slice(-3);
  const ops=['op20','op50','op100'];
  el.innerHTML=last3.map((m,i)=>{
    const ic=m.r==='sara'
      ?'<span class="material-symbols-outlined ico sara-ico">volume_up</span>'
      :'<span class="material-symbols-outlined ico user-ico">mic</span>';
    return `<div class="r-msg ${ops[i]}">${ic}${m.t}</div>`;
  }).join('')+'<div class="r-bottom"></div>';
}

// ═══════ DRAWER ═══════
function openDrawer(){
  if(open) return;
  open=true;
  renderChat();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('scrim').classList.add('on');
  document.getElementById('pttBar').style.display='none';
  document.getElementById('residual').style.pointerEvents='none';
  setTimeout(()=>{document.getElementById('chatHistory').scrollTop=document.getElementById('chatHistory').scrollHeight},60);
}
function closeDrawer(){
  if(!open) return;
  open=false;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('scrim').classList.remove('on');
  document.getElementById('txArea').classList.remove('on');
  document.getElementById('pttBar').style.display='flex';
  document.getElementById('residual').style.pointerEvents='auto';
  updateResidual();
}

// Scrim tap closes
document.getElementById('scrim').addEventListener('click',closeDrawer);
// Residual tap opens
document.getElementById('residual').addEventListener('click',()=>{if(!open)openDrawer()});

// Swipe down on handle
let sy=0;
const ha=document.getElementById('handleArea');
ha.addEventListener('touchstart',e=>{sy=e.touches[0].clientY},{passive:true});
ha.addEventListener('touchmove',e=>{if(e.touches[0].clientY-sy>50)closeDrawer()},{passive:true});

// ═══════ PTT ═══════
let processing=false; // block new recordings while SARA is responding

function startRec(){
  if(recording||processing||demoIdx>=exchanges.length) return;
  recording=true;
  if(!open) openDrawer();

  const ex=exchanges[demoIdx];
  const uW=ex.user;

  const a=document.getElementById('txArea');
  a.classList.add('on');
  document.getElementById('txText').innerHTML='';
  document.getElementById('txText').classList.remove('dim');
  document.getElementById('scan').classList.remove('on');
  document.getElementById('scan').innerHTML='<div class="bar"></div>';
  document.getElementById('sr').classList.remove('on');
  document.getElementById('srText').innerHTML='';
  document.getElementById('waveform').classList.remove('off');

  document.getElementById('pttBtn').classList.add('active');
  document.getElementById('dPttBtn').classList.add('active');

  let wi=0;
  const tt=document.getElementById('txText');
  wt=setInterval(()=>{
    if(wi<uW.length){
      const s=document.createElement('span');
      s.className='w';
      s.textContent=(wi>0?' ':'')+uW[wi];
      tt.appendChild(s);
      wi++;
    } else {clearInterval(wt);wt=null}
  },200);
}

function stopRec(){
  if(!recording) return;
  recording=false;
  processing=true;
  if(wt){clearInterval(wt);wt=null}

  const ex=exchanges[demoIdx];
  const uW=ex.user;
  const sW=ex.sara;

  document.getElementById('pttBtn').classList.remove('active');
  document.getElementById('dPttBtn').classList.remove('active');

  // Fill remaining words
  const tt=document.getElementById('txText');
  const have=tt.querySelectorAll('.w').length;
  for(let i=have;i<uW.length;i++){
    const s=document.createElement('span');s.className='w';
    s.textContent=(i>0?' ':'')+uW[i];tt.appendChild(s);
  }

  document.getElementById('waveform').classList.add('off');
  msgs.push({r:'user',t:uW.join(' ')});
  renderChat();

  // Scan
  setTimeout(()=>{document.getElementById('scan').classList.add('on')},400);
  // Dim
  setTimeout(()=>{tt.classList.add('dim')},700);
  // SARA
  setTimeout(()=>{
    document.getElementById('sr').classList.add('on');
    const st=document.getElementById('srText');
    let si=0;
    const timer=setInterval(()=>{
      if(si<sW.length){
        const s=document.createElement('span');s.className='w';
        s.textContent=(si>0?' ':'')+sW[si];st.appendChild(s);si++;
      } else {
        clearInterval(timer);
        msgs.push({r:'sara',t:sW.join(' ')});
        renderChat();
        demoIdx++;
        processing=false;
        setTimeout(closeDrawer,1200);
      }
    },120);
  },1800);
}

// Bind both PTT buttons
[document.getElementById('pttBtn'),document.getElementById('dPttBtn')].forEach(b=>{
  b.addEventListener('touchstart',e=>{e.preventDefault();startRec()});
  b.addEventListener('touchend',e=>{e.preventDefault();stopRec()});
  b.addEventListener('mousedown',e=>{e.preventDefault();startRec()});
  b.addEventListener('mouseup',e=>{e.preventDefault();stopRec()});
});

// ═══════ MAP GESTURES ═══════
// Prevent body scroll but allow map pinch/zoom/pan
document.addEventListener('touchmove',e=>{
  // Allow scroll inside chat history
  if(e.target.closest('.chat-history')) return;
  // Allow on .map
  if(e.target.closest('.map')) return;
  // Block everything else from scrolling
  e.preventDefault();
},{passive:false});

// ═══════ INIT ═══════
updateResidual();
</script>
</body>
</html>
