<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phalanx — Access</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #09090b;
    color: #e4e4e7;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .gate {
    text-align: center;
    max-width: 360px;
    padding: 40px;
  }
  .logo {
    font-weight: 700;
    font-size: 28px;
    color: #fafafa;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 11px;
    font-weight: 500;
    color: #71717a;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 40px;
  }
  .input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  input {
    flex: 1;
    background: #161a1e;
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 6px;
    padding: 12px 16px;
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 13px;
    color: #e4e4e7;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: rgba(255,255,255,.16); }
  input::placeholder { color: #52525b; }
  button {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 12px 20px;
    background: #161a1e;
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 6px;
    color: #a1a1aa;
    cursor: pointer;
    transition: all .15s;
  }
  button:hover { background: #1c2027; border-color: rgba(255,255,255,.16); color: #e4e4e7; }
  .error {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #f87171;
    opacity: 0;
    transition: opacity .2s;
  }
  .error.visible { opacity: 1; }

  /* Wireframe mode */
  body.wireframe {
    background: #f0f0f0;
    color: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body.wireframe .logo { color: #1a1a1a; }
  body.wireframe .subtitle { color: #999; }
  body.wireframe input {
    background: #fff;
    border: 1px solid #ccc;
    color: #1a1a1a;
  }
  body.wireframe input:focus { border-color: #999; }
  body.wireframe input::placeholder { color: #999; }
  body.wireframe button {
    background: #fff;
    border: 1px solid #999;
    color: #333;
  }
  body.wireframe button:hover { background: #f0f0f0; }
  body.wireframe .error { color: #333; }
</style>
</head>
<body>
<div class="gate">
  <div class="logo">Phalanx</div>
  <div class="subtitle">Drone Mission Control</div>
  <div class="input-group">
    <input type="password" id="pw" placeholder="Enter access code..." autofocus
      onkeydown="if(event.key==='Enter')check()">
    <button onclick="check()">Enter</button>
  </div>
  <div class="error" id="err">Incorrect access code</div>
</div>
<script>
  if (new URLSearchParams(window.location.search).has('wireframe')) {
    document.body.classList.add('wireframe');
  }
  function check() {
    const v = document.getElementById('pw').value;
    if (v === 'phalanx') {
      const params = new URLSearchParams(window.location.search);
      window.location.href = 'app.html' + (params.has('wireframe') ? '?wireframe' : '');
    } else {
      document.getElementById('err').classList.add('visible');
      document.getElementById('pw').value = '';
      setTimeout(() => document.getElementById('err').classList.remove('visible'), 2000);
    }
  }
</script>
</body>
</html>
